<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "en-IN" }}" class="no-js">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <!-- GTM noscript -->
  {{ with .Site.Params.gtmId }}
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id={{ . }}" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  {{ end }}

  {{ partial "header.html" . }}

  <main id="main-content" role="main" tabindex="-1">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <!-- Scroll to top -->
  <button class="vx-scroll-top" aria-label="Scroll to top">
    <i class="bi bi-arrow-up"></i>
  </button>

  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function(user) {
        if (!user) {
          window.netlifyIdentity.on("login", function() {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9Nc2+QxCEZq5Gqfhf/tGXM3glbJlTB7VGBLvMRR4FDf2VN0bZC4vK" crossorigin="anonymous"></script>

  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <!-- Custom JS -->
  {{ $js := resources.Get "js/main.js" }}
  <script src="{{ $js.RelPermalink }}"></script>

  {{ block "scripts" . }}{{ end }}
</body>
</html>
