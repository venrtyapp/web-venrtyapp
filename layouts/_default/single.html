{{ define "main" }}
<section class="vx-page-hero">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="/">Home</a>
      <i class="bi bi-chevron-right" style="font-size:0.625rem;"></i>
      <span>{{ .Title }}</span>
    </nav>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="subtitle">{{ . }}</p>{{ end }}
  </div>
</section>

<section class="vx-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="vx-seo-content">
          {{ .Content }}
        </div>
      </div>
    </div>
  </div>
</section>
{{ end }}
